<div class="app-shell">
  <aside class="app-sidebar" [class.open]="isSidebarOpen">
      <div class="app-brand">
        <div class="brand-icon" aria-label="Store Admin logo"></div>
        <div class="brand-text">
          <div class="brand-title">Store Admin</div>
          <div class="brand-subtitle">Management</div>
        </div>
      </div>

      <nav class="app-nav">
      <a [routerLink]="['/dashboard']" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="app-nav-link">
        <i class="bi bi-speedometer2"></i><span>Dashboard</span>
      </a>
      <a [routerLink]="['./products']" routerLinkActive="active" class="app-nav-link">
        <i class="bi bi-box-seam"></i><span>Products</span>
      </a>
      <a [routerLink]="['./stores']" routerLinkActive="active" class="app-nav-link">
        <i class="bi bi-shop"></i><span>Stores</span>
      </a>
      <a [routerLink]="['./categories']" routerLinkActive="active" class="app-nav-link">
        <i class="bi bi-tags"></i><span>Categories</span>
      </a>
      <a [routerLink]="['./subcategories']" routerLinkActive="active" class="app-nav-link">
        <i class="bi bi-diagram-3"></i><span>Subcategories</span>
      </a>
      <a [routerLink]="['./orders']" routerLinkActive="active" class="app-nav-link">
        <i class="bi bi-receipt"></i><span>Orders</span>
      </a>
      <a [routerLink]="['./carts']" routerLinkActive="active" class="app-nav-link">
        <i class="bi bi-cart"></i><span>Carts</span>
      </a>
      <a [routerLink]="['./delivery-locations']" routerLinkActive="active" class="app-nav-link">
        <i class="bi bi-geo-alt"></i><span>Delivery Locations</span>
      </a>
      <a [routerLink]="['./users']" routerLinkActive="active" class="app-nav-link">
        <i class="bi bi-people"></i><span>Users</span>
      </a>
      <a [routerLink]="['./user-addresses']" routerLinkActive="active" class="app-nav-link">
        <i class="bi bi-house"></i><span>User Addresses</span>
      </a>
      <a [routerLink]="['./app-settings']" routerLinkActive="active" class="app-nav-link">
        <i class="bi bi-sliders"></i><span>App Settings</span>
      </a>
      </nav>
  </aside>
  <div class="mobile-overlay" *ngIf="isSidebarOpen" (click)="closeSidebar()"></div>

  <section class="app-main">
    <nav class="app-topbar">
      <button class="btn btn-outline-secondary btn-sm d-lg-none me-3" (click)="toggleSidebar()" aria-label="Toggle menu">
        <i class="bi bi-list"></i>
      </button>
      <div class="topbar-title">
        <img
          src="/logo.png"
          alt="Admin"
          width="26"
          height="26"
          style="vertical-align: middle; margin-right: 10px"
          decoding="async"
        />
        Dashboard
      </div>
      <div class="topbar-actions">
        <div class="text-muted small me-3" *ngIf="phone">
          <i class="bi bi-telephone me-1"></i>{{ phone }}
        </div>
        <button class="btn btn-outline-secondary btn-sm" (click)="logout()">
          <i class="bi bi-person-circle me-1"></i> Logout
        </button>
      </div>
    </nav>

    <main class="app-content">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
