<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-diagram-3 text-primary"></i> Subcategories Management</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#subcategoryModal" (click)="openAddModal()">
      <i class="bi bi-plus-circle"></i> Add Subcategory
    </button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover table-striped">
          <thead class="table-dark">
            <tr>
              <th><i class="bi bi-tag"></i> Name</th>
              <th><i class="bi bi-file-text"></i> Description</th>
              <th><i class="bi bi-tags"></i> Category</th>
              <th><i class="bi bi-gear"></i> Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let subcategory of subcategories">
              <td>{{ subcategory.name }}</td>
              <td>{{ subcategory.description }}</td>
              <td><span class="badge bg-secondary">{{ subcategory.categoryId?.name }}</span></td>
              <td>
                <button class="btn btn-sm btn-outline-warning me-2" data-bs-toggle="modal" data-bs-target="#subcategoryModal" (click)="editSubcategory(subcategory)">
                  <i class="bi bi-pencil"></i> Edit
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="deleteSubcategory(subcategory._id)">
                  <i class="bi bi-trash"></i> Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="subcategoryModal" tabindex="-1" aria-labelledby="subcategoryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="subcategoryModalLabel">
            <i class="bi bi-diagram-3"></i> {{ isEditMode ? 'Edit Subcategory' : 'Add Subcategory' }}
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" (click)="closeModal()"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="name" class="form-label"><i class="bi bi-tag"></i> Name</label>
                <input type="text" class="form-control" id="name" [(ngModel)]="selectedSubcategory.name" name="name" placeholder="Enter subcategory name">
              </div>
              <div class="col-md-6 mb-3">
                <label for="categoryId" class="form-label"><i class="bi bi-tags"></i> Category</label>
                <select class="form-select" id="categoryId" [(ngModel)]="selectedSubcategory.categoryId" name="categoryId">
                  <option *ngFor="let category of categories" [ngValue]="category">{{ category.name }}</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label for="description" class="form-label"><i class="bi bi-file-text"></i> Description</label>
              <textarea class="form-control" id="description" [(ngModel)]="selectedSubcategory.description" name="description" rows="3" placeholder="Enter description"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="closeModal()">
            <i class="bi bi-x-circle"></i> Close
          </button>
          <button type="button" class="btn btn-primary" (click)="saveSubcategory()">
            <i class="bi bi-check-circle"></i> {{ isEditMode ? 'Update' : 'Save' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
