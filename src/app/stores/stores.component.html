<div class="container-fluid management-page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-shop text-primary"></i> Stores Management</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#storeModal" (click)="openAddModal()">
      <i class="bi bi-plus-circle"></i> Add Store
    </button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover table-striped">
          <thead class="table-dark">
            <tr>
              <th><i class="bi bi-tag"></i> Name</th>
              <th><i class="bi bi-geo-alt"></i> Location</th>
              <th><i class="bi bi-check-circle"></i> Active</th>
              <th><i class="bi bi-gear"></i> Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let store of stores">
              <td>{{ store.name }}</td>
              <td>{{ store.location }}</td>
              <td>
                <span class="badge" [ngClass]="store.isActive ? 'bg-success' : 'bg-danger'">
                  {{ store.isActive ? 'Active' : 'Inactive' }}
                </span>
              </td>
              <td>
                <button class="btn btn-sm btn-outline-warning me-2" data-bs-toggle="modal" data-bs-target="#storeModal" (click)="editStore(store)">
                  <i class="bi bi-pencil"></i> Edit
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="deleteStore(store._id)">
                  <i class="bi bi-trash"></i> Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="storeModal" tabindex="-1" aria-labelledby="storeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="storeModalLabel">
            <i class="bi bi-shop"></i> {{ isEditMode ? 'Edit Store' : 'Add Store' }}
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" (click)="closeModal()"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="name" class="form-label"><i class="bi bi-tag"></i> Name</label>
                <input type="text" class="form-control" id="name" [(ngModel)]="selectedStore.name" name="name" placeholder="Enter store name">
              </div>
              <div class="col-md-6 mb-3">
                <label for="location" class="form-label"><i class="bi bi-geo-alt"></i> Location</label>
                <input type="text" class="form-control" id="location" [(ngModel)]="selectedStore.location" name="location" placeholder="Enter store location">
              </div>
            </div>
            <div class="mb-3 form-check form-switch">
              <input class="form-check-input" type="checkbox" id="isActive" [(ngModel)]="selectedStore.isActive" name="isActive">
              <label class="form-check-label" for="isActive">Active</label>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="closeModal()">
            <i class="bi bi-x-circle"></i> Close
          </button>
          <button type="button" class="btn btn-primary" (click)="saveStore()">
            <i class="bi bi-check-circle"></i> {{ isEditMode ? 'Update' : 'Save' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
