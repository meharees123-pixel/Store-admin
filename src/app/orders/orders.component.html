<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-receipt text-primary"></i> Orders Management</h2>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover table-striped">
          <thead class="table-dark">
            <tr>
              <th><i class="bi bi-person"></i> User</th>
              <th><i class="bi bi-flag"></i> Status</th>
              <th><i class="bi bi-cash"></i> Total</th>
              <th><i class="bi bi-gear"></i> Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let order of orders">
              <td>{{ order.userId?.name || order.userId }}</td>
              <td>
                <span class="badge" [ngClass]="getStatusBadgeClass(order.status)">{{ order.status }}</span>
              </td>
              <td><span class="badge bg-success">${{ order.totalAmount }}</span></td>
              <td>
                <button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal" data-bs-target="#orderModal" (click)="editOrder(order)">
                  <i class="bi bi-pencil"></i> Edit
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="orderModal" tabindex="-1" aria-labelledby="orderModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="orderModalLabel">
            <i class="bi bi-receipt"></i> Edit Order
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" (click)="closeModal()"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="user" class="form-label"><i class="bi bi-person"></i> User</label>
                <input type="text" class="form-control" id="user" [value]="selectedOrder.userId?.name" readonly>
              </div>
              <div class="col-md-6 mb-3">
                <label for="totalAmount" class="form-label"><i class="bi bi-cash"></i> Total Amount</label>
                <input type="number" class="form-control" id="totalAmount" [value]="selectedOrder.totalAmount" readonly>
              </div>
            </div>
            <div class="mb-3">
              <label for="status" class="form-label"><i class="bi bi-flag"></i> Status</label>
              <select class="form-select" id="status" [(ngModel)]="selectedOrder.status" name="status">
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="closeModal()">
            <i class="bi bi-x-circle"></i> Close
          </button>
          <button type="button" class="btn btn-primary" (click)="saveOrder()">
            <i class="bi bi-check-circle"></i> Update
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
