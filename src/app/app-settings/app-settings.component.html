<div class="container-fluid management-page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-gear text-primary"></i> App Settings Management</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#settingModal" (click)="openAddModal()">
      <i class="bi bi-plus-circle"></i> Add Setting
    </button>
  </div>

  <div class="card shadow-sm mb-3 filters-card">
    <div class="card-body filters-panel">
      <div class="row g-2 align-items-end">
        <div class="col-12 col-md-6 col-lg-4">
          <label class="form-label">Filter by Store (optional)</label>
          <select class="form-select" [(ngModel)]="storeFilterId" name="storeFilterId">
            <option value="">All stores + global</option>
            <option *ngFor="let s of stores" [value]="s._id">{{ s.name }}</option>
          </select>
        </div>
        <div class="col-12 col-md-auto">
          <button class="btn btn-outline-primary" (click)="loadSettings()">
            <i class="bi bi-funnel"></i> Apply
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover table-striped">
          <thead class="table-dark">
            <tr>
              <th><i class="bi bi-key"></i> Key</th>
              <th><i class="bi bi-shop"></i> Store</th>
              <th><i class="bi bi-tag"></i> Value</th>
              <th><i class="bi bi-file-text"></i> Description</th>
              <th><i class="bi bi-gear"></i> Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let setting of settings">
              <td>{{ setting.key }}</td>
              <td>{{ storeName(setting.storeId) }}</td>
              <td>{{ setting.value }}</td>
              <td>{{ setting.description }}</td>
              <td>
                <button class="btn btn-sm btn-outline-warning me-2" data-bs-toggle="modal" data-bs-target="#settingModal" (click)="editSetting(setting)">
                  <i class="bi bi-pencil"></i> Edit
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="deleteSetting(setting._id)">
                  <i class="bi bi-trash"></i> Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" #settingModal id="settingModal" tabindex="-1" aria-labelledby="settingModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="settingModalLabel">
            <i class="bi bi-gear"></i> {{ isEditMode ? 'Edit Setting' : 'Add Setting' }}
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" (click)="closeModal()"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label"><i class="bi bi-shop"></i> Store (optional)</label>
                <select class="form-select" [(ngModel)]="selectedSetting.storeId" name="storeId">
                  <option value="">Global</option>
                  <option *ngFor="let s of stores" [value]="s._id">{{ s.name }}</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label for="key" class="form-label"><i class="bi bi-key"></i> Key</label>
                <input type="text" class="form-control" id="key" [(ngModel)]="selectedSetting.key" name="key" placeholder="Enter setting key">
              </div>
              <div class="col-md-6 mb-3">
                <label for="value" class="form-label"><i class="bi bi-tag"></i> Value</label>
                <input type="text" class="form-control" id="value" [(ngModel)]="selectedSetting.value" name="value" placeholder="Enter value">
              </div>
            </div>
            <div class="mb-3">
              <label for="description" class="form-label"><i class="bi bi-file-text"></i> Description</label>
              <textarea class="form-control" id="description" [(ngModel)]="selectedSetting.description" name="description" rows="3" placeholder="Enter description"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="closeModal()">
            <i class="bi bi-x-circle"></i> Close
          </button>
          <button type="button" class="btn btn-primary" (click)="saveSetting()">
            <i class="bi bi-check-circle"></i> {{ isEditMode ? 'Update' : 'Save' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
